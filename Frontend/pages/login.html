<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт з реєстрації події</title>
    <link rel="stylesheet" href="../css/baseStyle.css">
    <link rel="stylesheet" href="../css/styleForLoginForm.css">
    <link rel="stylesheet" href="../css/header.css">
    <script type="module" src="../src/login.main.js" defer></script>
</head>
<body>
<div id="wrap">
    <header>
        <span class="logo">
            <a href="events.html"><img alt="FIT logo" src="../icons/FIT_icon.png">&nbsp;& JunkoTeam</a></span>
        <nav class="navbar_header">
            <ul>
                <li><a href="login.html">Login</a></li>
                <li><a href="registration.html">Registration</a></li>
            </ul>
        </nav>
    </header>
    <br>
    <div class="spinner-wrapper hidden"><div id="spinner" class="spinner hidden"></div></div>
    <main>
        <div class="toolbox">
            <div class="text"></div>
            <div class="bar">
                <div class="bar-fill"></div>
            </div>
        </div>

        <h1 id="header_h1">Вітаю<br>Будь ласка, увійдіть у свій акаунт</h1>
        <div class="container">
            <div class="form_container">
                <form class="register-form" id="register-form" novalidate>
                    <div class="register-form_email_div">
                        <label for="register-form_email">Email</label>
                        <input id="register-form_email" type="email" name="email" placeholder="Введіть email..." >
                        <small class="error" id="email_error"></small>
                    </div>
                    <div class="register-form_password_div">
                        <label for="register-form_password">Пароль</label>
                        <input  id="register-form_password" name="password" type="password">
                        <small class="error" id="password_error"></small>
                    </div>
                    <div class="register-form_buttons">
                        <div class="register-form_button_submit">
                            <button id ="submit_button" type="submit">Підтвердити</button>
                        </div>
                        <div class="register-form_button_reset">
                            <button id="reset_button" type="button">Відмінити</button>
                        </div>
                    </div>
                    <small class="error visible" id="general_error"></small>
                </form>
            </div>
        </div>
    </main>
</div>


</body>
</html>
