    <main>
        <div class="toolbox">

        <h1 id="header_h1">Варіант №7<br>Сайт зі створення користувачів</h1>
        <div class="container">
            <div class="form_container">
                <form class="register-form" id="register-form" novalidate>
                    <div class="register-form_name_div">
                        <label for="register-form_name">Ім'я</label>
                        <input id="register-form_name" type="text" name="name" placeholder="Введіть ім'я...">
                        <small class="error" id="name_error"></small>
                    </div>
                    <div class="register-form_email_div">
                        <label for="register-form_email">Email</label>
                        <input id="register-form_email" type="email" name="email" placeholder="Введіть email..." >
                        <small class="error" id="email_error"></small>
                    </div>
                    <div class="register-form_password_div">
                        <label for="register-form_password">Пароль</label>
                        <input  id="register-form_password" name="password" type="password">
                        <small class="error" id="password_error"></small>
                    </div>
                    <div class="register-form_buttons">
                        <div class="register-form_button_submit">
                            <button id ="submit_button" type="submit">Підтвердити</button>
                        </div>
                        <div class="register-form_button_reset">
                            <button id="reset_button" type="button">Відмінити</button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="table_container">
                <!--                <div class="table_filters">-->

                <!--                        <input id="input_for_search" type="text">-->

                <!--                    </div>-->

                <!--                        <option value="name_sorter">За назвою</option>-->
                <!--                        <option value="email_sorter">За поштою</option>-->
                <!--                    </select>-->
                <!--                </div>-->
                <table class="register_table">
                    <thead class="register_table_head">
                    <tr>
                        <th>Номер</th>
                        <th>Ім'я</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Видалити</th>
                        <th>Редагувати/Зберегти</th>
                    </tr>
                    </thead>
                    <tbody class="register_table_body">

                    </tbody>
