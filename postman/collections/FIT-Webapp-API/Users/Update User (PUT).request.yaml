$kind: http-request
name: 'Update User (PUT)'
method: PUT
url: '{{baseUrl}}/api/users/{{userId}}'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123"
    }
